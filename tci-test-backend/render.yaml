databases:
  - name: tci-test-db
    databaseName: tci_test
    user: tci_user
    plan: free

services:
  - type: web
    name: tci-test-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:push && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tci-test-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
